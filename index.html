<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Camp Registration Form</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f7fa;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #2c3e50;
}

h2 {
    background: #3498db;
    color: white;
    padding: 10px;
    border-radius: 5px;
}

.row {
    display: flex;
    gap: 20px;
}

.col {
    flex: 1;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

input,
select {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
}

button {
    width: 100%;
    background: #27ae60;
    color: white;
    border: none;
    padding: 15px;
    font-size: 18px;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 15px;
}

button:hover {
    background: #219150;
}

.success {
    display: none;
    background: #d4edda;
    color: #155724;
    padding: 15px;
    margin-top: 20px;
    border-radius: 5px;
}

.error {
    display: none;
    background: #f8d7da;
    color: #721c24;
    padding: 15px;
    margin-top: 20px;
    border-radius: 5px;
}

@media(max-width:768px){
    .row{
        flex-direction:column;
    }
}
</style>

</head>

<body>

<div class="container">

<h1>Summer Camp Registration Form</h1>

<form id="campForm">

<h2>Camper Information</h2>

<div class="row">
    <div class="col">
        <label>First Name</label>
        <input id="firstName" type="text" required>
    </div>

```
<div class="col">
    <label>Last Name</label>
    <input id="lastName" type="text" required>
</div>
```

</div>

<br>

<div class="row">
    <div class="col">
        <label>Date of Birth</label>
        <input id="dob" type="date" required>
    </div>

```
<div class="col">
    <label>Gender</label>
    <select id="gender" required>
        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select>
</div>
```

</div>

<button type="submit">Register Camper</button>

</form>

<div class="success" id="successMessage">
Registration submitted successfully!
</div>

<div class="error" id="errorMessage">
Registration failed. Please try again.
</div>

</div>

<script>
document.getElementById("campForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        dob: document.getElementById("dob").value,
        gender: document.getElementById("gender").value
    };

    try {

        await fetch("https://script.google.com/macros/s/AKfycbxgTbV-QTBeJZvARMBIbVoTl19Sx12B1fRnvJjFHsctLR8VcM-9MpLgboeoYpzySFHd/exec", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        document.getElementById("successMessage").style.display = "block";
        document.getElementById("errorMessage").style.display = "none";

        this.reset();

    } catch(error) {

        document.getElementById("errorMessage").style.display = "block";
        document.getElementById("successMessage").style.display = "none";

        console.error(error);
    }

});
</script>

</body>
</html>
